<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title>ESP32 遠端控制 v2</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        body { text-align: center; font-family: -apple-system, Arial; padding-top: 50px; background-color: #f4f4f9; color: #333; }
        .btn-container { margin: 20px; }
        button { 
            width: 140px; height: 80px; font-size: 20px; margin: 10px; 
            cursor: pointer; border-radius: 15px; border: none; 
            background: #ffffff; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: 0.3s active;
        }
        button:active { transform: scale(0.9); background: #eee; }
        #log { margin-top: 20px; font-weight: bold; padding: 10px; }
        .success { color: #2ecc71; }
        .danger { color: #e74c3c; }
    </style>
</head>
<body>
    <h1>MOTO 控制系統</h1>
    <h3>實體 LED (GPIO 12)</h3>
    
    <div class="btn-container">
        <button onclick="sendCmd('ON')">亮燈</button>
        <button onclick="sendCmd('OFF')">滅燈</button>
    </div>

    <div id="log">系統初始化中...</div>

    <script>
        // *** 這裡的主題名稱必須跟 ESP32 的 topicLedControl 一字不差 ***
        const myTopic = "moto/test/led_user_999"; 
        const broker = 'wss://broker.emqx.io:8084/mqtt';

        const client = mqtt.connect(broker);

        client.on('connect', () => {
            document.getElementById('log').innerHTML = "<span class='success'>✅ 雲端已連線</span>";
        });

        client.on('error', (err) => {
            document.getElementById('log').innerHTML = "<span class='danger'>❌ 連線失敗</span>";
        });

        function sendCmd(cmd) {
            if (client.connected) {
                client.publish(myTopic, cmd);
                document.getElementById('log').innerText = "已送出指令：" + cmd;
                console.log("Sent:", cmd, "to", myTopic);
                
                setTimeout(() => {
                    document.getElementById('log').innerHTML = "<span class='success'>✅ 雲端已連線</span>";
                }, 1500);
            } else {
                alert("伺服器斷開，請重整網頁");
            }
        }
    </script>
</body>
</html>
