<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>MotoUnlock 控制中心</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; text-align: center; background: #1e3c72; color: white; padding-top: 40px; }
        .unlock-btn { 
            width: 180px; height: 180px; border-radius: 50%; background: #4CAF50; 
            border: 8px solid rgba(255,255,255,0.2); font-size: 60px; color: white;
            cursor: pointer; margin: 20px auto; display: block; box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .unlock-btn:active { transform: scale(0.9); background: #388E3C; }
        .ctrl-btn { width: 100px; height: 50px; margin: 10px; cursor: pointer; border-radius: 8px; border: none; }
        #status { margin-top: 20px; font-size: 14px; color: #a0c4ff; }
    </style>
</head>
<body>
    <h1>MOTO UNLOCK</h1>
    
    <button class="unlock-btn" onclick="handleUnlock()">🔓</button>
    <p>點擊按鈕進行身份驗證</p>

    <hr style="width: 80%; opacity: 0.3;">

    <h3>手動測試</h3>
    <button class="ctrl-btn" onclick="send('ON')">亮燈</button>
    <button class="ctrl-btn" onclick="send('OFF')">熄燈</button>

    <div id="status">MQTT 連線中...</div>

    <script>
        const client = mqtt.connect('wss://broker.emqx.io:8084/mqtt');
        const topic = "moto/unlock/led";

        client.on('connect', () => {
            document.getElementById('status').innerText = "✅ 系統就緒 (雲端已連線)";
        });

        // 身份驗證與解鎖流程
        function handleUnlock() {
            // 在手機 PWA 模式下，這會觸發系統層級的確認
            if (confirm("確認身份以啟動解鎖？")) {
                send('UNLOCK');
                document.getElementById('status').innerText = "🚀 正在解鎖車輛...";
                if (navigator.vibrate) navigator.vibrate(200); // 震動回饋
            }
        }

        function send(cmd) {
            client.publish(topic, cmd);
        }
    </script>
</body>
</html>
