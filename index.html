<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title>ESP32 遠端控制面板</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        body { text-align: center; font-family: Arial, sans-serif; padding-top: 50px; background-color: #f4f4f9; color: #333; }
        .btn-container { margin: 20px; }
        button { 
            width: 140px; height: 70px; font-size: 18px; margin: 10px; 
            cursor: pointer; border-radius: 12px; border: 1px solid #ccc; 
            background: white; transition: 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        button:active { background: #e0e0e0; transform: scale(0.95); }
        #log { font-size: 14px; color: #888; margin-top: 20px; font-weight: bold; }
        .status-on { color: #28a745; }
        .status-off { color: #dc3545; }
    </style>
</head>
<body>
    <h1>ESP32 MQTT 控制系統</h1>
    
    <h3>實體 LED 控制 (GPIO 12)</h3>
    
    <div class="btn-container">
        <button onclick="sendCmd('ON')">打開 LED</button>
        <button onclick="sendCmd('OFF')">關閉 LED</button>
    </div>

    <div id="log">系統狀態：連線中...</div>

    <script>
        // === 必須對應你提供的 ESP32 程式碼設定 ===
        const broker = 'wss://broker.emqx.io:8084/mqtt';
        const topicLedControl = "moto/unlock/led"; // 必須與 ESP32 的 topicLedControl 一致

        const client = mqtt.connect(broker);

        client.on('connect', () => {
            document.getElementById('log').innerHTML = "系統狀態：<span class='status-on'>✅ 雲端已連線</span>";
            console.log("Connected to MQTT broker");
        });

        client.on('error', (err) => {
            document.getElementById('log').innerHTML = "系統狀態：<span class='status-off'>❌ 連線失敗</span>";
            console.error(err);
        });

        function sendCmd(cmd) {
            if (client.connected) {
                client.publish(topicLedControl, cmd);
                console.log("發送指令至 " + topicLedControl + " : " + cmd);
                document.getElementById('log').innerText = "指令已送出：" + cmd;
                
                // 2秒後恢復連線狀態顯示
                setTimeout(() => {
                    document.getElementById('log').innerHTML = "系統狀態：<span class='status-on'>✅ 雲端已連線</span>";
                }, 2000);
            } else {
                alert("尚未連線至 MQTT 伺服器，請檢查網路。");
            }
        }
    </script>
</body>
</html>
